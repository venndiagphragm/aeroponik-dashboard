<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeroponik - Pantau Aeroponik</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="Aeroponik Dashboard - Buku saku digital untuk pemantauan tanaman aeroponik harian. Sistem penilaian otomatis berbasis data riset.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1E3A8A">
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom config for specific colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#3B82F6',
                            DEFAULT: '#1E3A8A',
                            dark: '#172554',
                            accent: '#FBBF24',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Hide scrollbar for clean PWA look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col font-sans">
    
    <!-- Top Navigation -->
    <nav class="bg-brand text-white p-4 shadow-md flex justify-between items-center shrink-0 border-b-4 border-brand-accent">
        <a href="/" class="text-2xl font-bold tracking-wide flex items-center gap-2">
            <img src="/static/unair_logo.png" alt="Logo Unair" class="h-8 w-auto"> Aeroponik
        </a>
        <div class="flex items-center gap-2">
            <a href="/catat" class="text-brand bg-white px-3 py-1 rounded-full text-sm font-bold shadow-sm border border-gray-100">
                Catat
            </a>
            <a href="/batches" class="text-white bg-brand-light px-3 py-1 rounded-full text-sm font-semibold shadow-inner">
                Batch
            </a>
            <a href="/about" class="text-white bg-brand-dark px-3 py-1 rounded-full text-sm font-semibold shadow-inner">
                Bantuan ?
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 pb-24">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/static/service-worker.js")
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
