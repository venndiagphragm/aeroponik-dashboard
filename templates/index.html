{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto space-y-6">
    
    <!-- Title -->
    <div class="text-center">
        <h2 class="text-xl font-extrabold text-gray-800">Catat Harian</h2>
        <p class="text-gray-500 text-sm">Pilih hari dan sesuaikan angka</p>
    </div>

    <!-- Form -->
    <form id="logForm" class="bg-white p-5 rounded-2xl shadow-lg space-y-6">
        
        <!-- Hari Ke -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Umur Tanaman (Hari ke-)</label>
            <select name="hari_ke" id="hari_ke" class="w-full bg-gray-100 border-2 border-gray-200 text-gray-800 font-bold text-xl rounded-xl p-4 focus:outline-none focus:border-brand transition-colors">
                {% for i in range(1, 30) %}
                <option value="{{ i }}">Hari ke-{{ i }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Tinggi Tanaman -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Tinggi Tanaman (cm)</label>
            <div class="flex items-center justify-between bg-gray-100 rounded-xl p-2 border-2 border-gray-200">
                <button type="button" onclick="adjustValue('tinggi', -0.5)" class="w-16 h-16 bg-red-100 text-red-600 rounded-lg text-4xl font-bold active:bg-red-200 transition-colors shrink-0 flex items-center justify-center shadow-sm">-</button>
                <input type="number" name="tinggi" id="tinggi" value="2.0" step="0.5" readonly class="w-full text-center bg-transparent text-4xl font-extrabold text-gray-800 focus:outline-none pointer-events-none">
                <button type="button" onclick="adjustValue('tinggi', 0.5)" class="w-16 h-16 bg-brand-light text-white rounded-lg text-4xl font-bold active:bg-brand transition-colors shrink-0 flex items-center justify-center shadow-sm">+</button>
            </div>
        </div>

        <!-- Jumlah Daun -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Jumlah Daun (helai)</label>
            <div class="flex items-center justify-between bg-gray-100 rounded-xl p-2 border-2 border-gray-200">
                <button type="button" onclick="adjustValue('daun', -1)" class="w-16 h-16 bg-red-100 text-red-600 rounded-lg text-4xl font-bold active:bg-red-200 transition-colors shrink-0 flex items-center justify-center shadow-sm">-</button>
                <input type="number" name="daun" id="daun" value="2" step="1" readonly class="w-full text-center bg-transparent text-4xl font-extrabold text-gray-800 focus:outline-none pointer-events-none">
                <button type="button" onclick="adjustValue('daun', 1)" class="w-16 h-16 bg-brand-light text-white rounded-lg text-4xl font-bold active:bg-brand transition-colors shrink-0 flex items-center justify-center shadow-sm">+</button>
            </div>
        </div>

        <!-- Foto Kamera -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Foto Kondisi Tanaman</label>
            <label for="foto" class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-brand bg-green-50 rounded-xl cursor-pointer hover:bg-green-100 transition-colors active:bg-green-200">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <span class="text-4xl mb-2">📷</span>
                    <p class="text-sm font-bold text-brand-dark" id="fotoLabel">Ketuk untuk Memotret</p>
                </div>
                <input id="foto" name="foto" type="file" accept="image/*" capture="environment" class="hidden" onchange="updateFileName(this)" />
            </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="w-full bg-brand hover:bg-brand-dark text-white text-xl font-extrabold py-5 rounded-xl shadow-lg transition-transform transform active:scale-95 flex items-center justify-center gap-2">
            <span>Simpan & Cek Kondisi</span>
            <span>✨</span>
        </button>

        <!-- Lihat Riwayat Button -->
        <a href="{{ url_for('logs') }}" class="w-full block text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-xl active:bg-gray-400 transition-colors">
            Lihat Riwayat Pencatatan 📋
        </a>

    </form>

    <!-- Feedback Panel (Hidden by default) -->
    <div id="feedbackPanel" class="hidden p-6 rounded-2xl shadow-xl border-l-8 transition-all duration-500 ease-in-out transform translate-y-4 opacity-0">
        <div class="flex items-center gap-4 mb-3">
            <div id="feedbackIcon" class="text-5xl"></div>
            <h3 id="feedbackTitle" class="text-2xl font-black"></h3>
        </div>
        <p id="feedbackMessage" class="text-lg font-medium text-gray-700 leading-relaxed"></p>
        <button type="button" onclick="resetForm()" class="mt-6 w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded-xl active:bg-gray-400 transition-colors">
            Tutup & Catat Lagi
        </button>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    // JS for + / - buttons
    function adjustValue(inputId, amount) {
        const input = document.getElementById(inputId);
        let current = parseFloat(input.value);
        if (isNaN(current)) current = 0;
        let newValue = current + amount;
        
        // Prevent negative values
        if (newValue < 0) newValue = 0;
        
        // Update value safely
        input.value = (inputId === 'daun') ? Math.round(newValue) : newValue.toFixed(1);
    }

    // Update camera label
    function updateFileName(input) {
        const label = document.getElementById('fotoLabel');
        if (input.files && input.files.length > 0) {
            label.textContent = "Foto siap dikirim! ✅";
            label.classList.replace('text-brand-dark', 'text-green-700');
        } else {
            label.textContent = "Ketuk untuk Memotret";
            label.classList.replace('text-green-700', 'text-brand-dark');
        }
    }

    // AJAX Form Submit
    document.getElementById('logForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Memproses... ⏳';
        btn.disabled = true;
        
        const formData = new FormData(this);
        
        fetch('{{ url_for("submit_log") }}', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                showFeedback(data.skor);
                // Hide form
                document.getElementById('logForm').classList.add('hidden');
            } else {
                alert("Terjadi kesalahan: " + data.message);
            }
        })
        .catch(error => {
            alert("Gagal terhubung ke server.");
            console.error('Error:', error);
        })
        .finally(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    });

    function showFeedback(skor) {
        const panel = document.getElementById('feedbackPanel');
        const icon = document.getElementById('feedbackIcon');
        const title = document.getElementById('feedbackTitle');
        const message = document.getElementById('feedbackMessage');
        
        // Reset classes
        panel.className = "p-6 rounded-2xl shadow-xl border-l-8 transition-all duration-500 ease-in-out transform translate-y-0 opacity-100 block";
        
        if (skor === 'Hijau') {
            panel.classList.add('bg-green-50', 'border-green-500');
            title.className = "text-2xl font-black text-green-700";
            icon.innerHTML = "🟢";
            title.textContent = "Optimal!";
            message.textContent = "Mantap! Bayam tumbuh subur. Teruskan perawatan rutin Anda.";
        } else if (skor === 'Kuning') {
            panel.classList.add('bg-yellow-50', 'border-yellow-500');
            title.className = "text-2xl font-black text-yellow-700";
            icon.innerHTML = "🟡";
            title.textContent = "Perhatian";
            message.textContent = "Tumbuh agak lambat. Cek kelancaran air dan pastikan lingkungan tidak terlalu panas.";
        } else {
            panel.classList.add('bg-red-50', 'border-red-600');
            title.className = "text-2xl font-black text-red-700";
            icon.innerHTML = "🔴";
            title.textContent = "Kritis!";
            message.textContent = "Darurat! Segera periksa semprotan air dan pastikan akar tidak mengering atau busuk.";
        }
    }

    function resetForm() {
        document.getElementById('feedbackPanel').classList.replace('block', 'hidden');
        document.getElementById('feedbackPanel').classList.replace('opacity-100', 'opacity-0');
        document.getElementById('logForm').classList.remove('hidden');
        
        // Reset photo
        document.getElementById('foto').value = '';
        updateFileName(document.getElementById('foto'));
        
        // Increment day implicitly? Let's just let the user see the form again.
    }
</script>
{% endblock %}
